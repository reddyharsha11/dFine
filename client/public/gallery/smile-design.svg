<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Smile design planning</title>
  <desc id="desc">A dental smile design board with tooth shade samples and a bright smile preview.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#e7f3f0"/>
      <stop offset="1" stop-color="#fbf9f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#236358" flood-opacity=".16"/>
