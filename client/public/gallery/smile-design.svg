  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="1030" cy="120" r="170" fill="#fae8e0"/>
  <circle cx="160" cy="690" r="190" fill="#BDDBD1" opacity=".45"/>
  <rect x="145" y="120" width="910" height="560" rx="42" fill="#fff" filter="url(#shadow)"/>
  <rect x="205" y="180" width="490" height="340" rx="30" fill="#1a2e2a"/>
  <path d="M285 365c32 82 118 126 166 126s134-44 166-126c-34 26-92 44-166 44s-132-18-166-44Z" fill="#fff"/>
  <path d="M325 383c26 31 78 52 126 52s100-21 126-52" fill="none" stroke="#e8643a" stroke-width="12" stroke-linecap="round"/>
  <g fill="#fff" stroke="#2f7b6e" stroke-width="6">
