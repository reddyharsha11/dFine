  <text x="205" y="590" fill="#236358" font-family="Sora, Arial, sans-serif" font-size="42" font-weight="700">Smile Design</text>
  <text x="205" y="635" fill="#4a6b62" font-family="Arial, sans-serif" font-size="24">Digital planning and shade selection</text>
